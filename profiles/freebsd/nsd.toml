id = "nsd"
display_name = "NSD"

[platform]
os = "freebsd"
package = "nsd"
service_manager = "freebsd-rc"
service_name = "nsd"
config_paths = ["/usr/local/etc/nsd/nsd.conf"]

[discovery]
manpages = ["nsd", "nsd.conf", "nsd-checkconf"]
sample_patterns = ["/usr/local/etc/nsd/*.sample"]

[validation]
executable = "/usr/local/sbin/nsd-checkconf"
arguments = ["{staged_file}"]

[service]
preferred_action = "reload"
supports_reload = true
supports_restart = true

[logs]
paths = ["/var/log/messages"]
